<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-eyebrow">Cards — case study & writing</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
    <div style="border:1px solid var(--rule); border-radius:4px; padding:18px; background:var(--paper);">
      <div style="font-family:var(--font-sans); font-size:11px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-3);">CASE STUDY</div>
      <div style="font-family:var(--font-serif); font-weight:400; font-size:22px; letter-spacing:-0.01em; line-height:1.2; color:var(--ink); margin-top:8px;">Documentation infrastructure at scale</div>
      <div style="font-family:var(--font-sans); font-size:13px; line-height:1.55; color:var(--ink-3); margin-top:8px;">Replacing manual processes with a single durable pipeline.</div>
      <div style="display:flex; gap:10px; margin-top:14px; padding-top:12px; border-top:1px solid var(--rule);">
        <span style="font-family:var(--font-sans); font-size:12px; color:var(--ink-3);">Aug 2024</span>
        <span style="font-family:var(--font-sans); font-size:12px; color:var(--ink-3);">·</span>
        <span style="font-family:var(--font-sans); font-size:12px; color:var(--ink-3);">D365 BC</span>
      </div>
    </div>
    <div style="border:1px solid var(--rule); border-radius:4px; padding:18px; background:var(--paper);">
      <div style="font-family:var(--font-sans); font-size:11px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-3);">ESSAY · 8 MIN</div>
      <div style="font-family:var(--font-serif); font-weight:400; font-size:22px; letter-spacing:-0.01em; line-height:1.2; color:var(--ink); margin-top:8px;">On durable AI integrations</div>
      <div style="font-family:var(--font-sans); font-size:13px; line-height:1.55; color:var(--ink-3); margin-top:8px;">Why most AI features fail in enterprise software, and what holds up.</div>
      <div style="display:flex; gap:10px; margin-top:14px; padding-top:12px; border-top:1px solid var(--rule);">
        <span style="font-family:var(--font-sans); font-size:12px; color:var(--ink-3);">Mar 2025</span>
      </div>
    </div>
  </div>
</body></html>
