<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-eyebrow">Personal mark — monogram & wordmark</div>
  <div style="display:grid; grid-template-columns: 140px 1fr; gap:32px; align-items:center;">
    <!-- Monogram tile -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <div style="width:96px; height:96px; border:1px solid var(--ink); display:flex; align-items:center; justify-content:center; border-radius:4px;">
        <span style="font-family:var(--font-serif); font-weight:300; font-size:48px; letter-spacing:-0.02em; color:var(--ink);">MC</span>
      </div>
      <div style="font-size:12px; color:var(--ink-3); letter-spacing:0.04em;">nav · 1×1</div>
    </div>
    <!-- Wordmark -->
    <div style="display:flex; flex-direction:column; gap:14px;">
      <div style="font-family:var(--font-serif); font-weight:300; font-size:54px; letter-spacing:-0.02em; line-height:1; color:var(--ink);">Matt Cory</div>
      <div style="display:flex; gap:18px; align-items:center;">
        <div style="font-family:var(--font-serif); font-weight:300; font-size:22px; letter-spacing:-0.01em; color:var(--ink);">Matt Cory</div>
        <div style="font-family:var(--font-serif); font-weight:300; font-size:16px; letter-spacing:-0.005em; color:var(--ink);">Matt Cory</div>
      </div>
      <div style="font-size:12px; color:var(--ink-3); letter-spacing:0.04em;">footer · inline · sigline</div>
    </div>
  </div>
</body></html>
