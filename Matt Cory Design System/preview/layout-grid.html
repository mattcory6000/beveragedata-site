<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-eyebrow">Layout grid — 12 columns</div>
  <div style="display:grid; grid-template-columns: repeat(12, 1fr); gap:12px; height:120px;">
    <div style="background:var(--accent-tint); border:1px solid var(--rule);"></div>
    <div style="background:var(--accent-tint); border:1px solid var(--rule);"></div>
    <div style="background:var(--accent-tint); border:1px solid var(--rule);"></div>
    <div style="background:var(--accent-tint); border:1px solid var(--rule);"></div>
    <div style="background:var(--accent-tint); border:1px solid var(--rule);"></div>
    <div style="background:var(--accent-tint); border:1px solid var(--rule);"></div>
    <div style="background:var(--accent-tint); border:1px solid var(--rule);"></div>
    <div style="background:var(--accent-tint); border:1px solid var(--rule);"></div>
    <div style="background:var(--accent-tint); border:1px solid var(--rule);"></div>
    <div style="background:var(--accent-tint); border:1px solid var(--rule);"></div>
    <div style="background:var(--accent-tint); border:1px solid var(--rule);"></div>
    <div style="background:var(--accent-tint); border:1px solid var(--rule);"></div>
  </div>
  <div style="display:flex; justify-content:space-between; margin-top:14px;">
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">12 cols · 12px gutter</span>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">max 1240px · pad clamp(20, 5vw, 64)</span>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">prose 64ch</span>
  </div>
</body></html>
