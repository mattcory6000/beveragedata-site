<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-eyebrow">Spacing scale — 4px base</div>
  <div style="display:grid; grid-template-columns: 56px 1fr 60px; gap:6px 16px; align-items:center;">
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">s-1</span>
    <div style="height:8px; width:4px; background:var(--ink);"></div>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">4px</span>

    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">s-2</span>
    <div style="height:8px; width:8px; background:var(--ink);"></div>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">8px</span>

    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">s-3</span>
    <div style="height:8px; width:12px; background:var(--ink);"></div>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">12px</span>

    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">s-4</span>
    <div style="height:8px; width:16px; background:var(--ink);"></div>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">16px</span>

    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">s-5</span>
    <div style="height:8px; width:24px; background:var(--ink);"></div>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">24px</span>

    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">s-6</span>
    <div style="height:8px; width:32px; background:var(--ink);"></div>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">32px</span>

    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">s-7</span>
    <div style="height:8px; width:48px; background:var(--ink);"></div>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">48px</span>

    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">s-8</span>
    <div style="height:8px; width:64px; background:var(--ink);"></div>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">64px</span>

    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">s-9</span>
    <div style="height:8px; width:96px; background:var(--ink);"></div>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">96px</span>

    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">s-10</span>
    <div style="height:8px; width:128px; background:var(--ink);"></div>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">128px</span>

    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">s-11</span>
    <div style="height:8px; width:192px; background:var(--ink);"></div>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">192px</span>
  </div>
</body></html>
