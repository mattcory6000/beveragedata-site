<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-eyebrow">Form inputs</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:18px; max-width:600px;">
    <div>
      <label style="font-family:var(--font-sans); font-size:12px; font-weight:500; letter-spacing:0.04em; color:var(--ink-2); display:block; margin-bottom:6px;">Email</label>
      <input value="hello@mattcory.dev" style="width:100%; box-sizing:border-box; font-family:var(--font-sans); font-size:14px; color:var(--ink); background:var(--paper); border:1px solid var(--rule-strong); border-radius:4px; padding:10px 12px;">
    </div>
    <div>
      <label style="font-family:var(--font-sans); font-size:12px; font-weight:500; letter-spacing:0.04em; color:var(--ink-2); display:block; margin-bottom:6px;">Topic</label>
      <select style="width:100%; box-sizing:border-box; font-family:var(--font-sans); font-size:14px; color:var(--ink); background:var(--paper); border:1px solid var(--rule-strong); border-radius:4px; padding:10px 12px; appearance:none;">
        <option>Architecture review</option>
      </select>
    </div>
    <div style="grid-column:1/-1;">
      <label style="font-family:var(--font-sans); font-size:12px; font-weight:500; letter-spacing:0.04em; color:var(--ink-2); display:block; margin-bottom:6px;">Message <span style="color:var(--ink-3); font-weight:400;">— what you're working on</span></label>
      <textarea style="width:100%; box-sizing:border-box; font-family:var(--font-sans); font-size:14px; color:var(--ink); background:var(--paper); border:1px solid #7A2E2A; outline:0; box-shadow:0 0 0 3px #F0E2DF; border-radius:4px; padding:10px 12px; min-height:54px; resize:vertical;">A brief outline of the system…</textarea>
    </div>
  </div>
</body></html>
