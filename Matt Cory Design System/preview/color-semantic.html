<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-eyebrow">Semantic — quiet earth tones</div>
  <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:14px;">
    <div>
      <div style="height:90px; background:#4A6B3A; border-radius:4px; display:flex; align-items:flex-end; padding:10px;">
        <span style="font-family:var(--font-mono); font-size:11px; color:#FAF7F2;">success</span>
      </div>
      <div style="margin-top:8px; font-family:var(--font-sans); font-size:12px; color:var(--ink); font-weight:500;">Success</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">#4A6B3A</div>
    </div>
    <div>
      <div style="height:90px; background:#8C5A1F; border-radius:4px; display:flex; align-items:flex-end; padding:10px;">
        <span style="font-family:var(--font-mono); font-size:11px; color:#FAF7F2;">warn</span>
      </div>
      <div style="margin-top:8px; font-family:var(--font-sans); font-size:12px; color:var(--ink); font-weight:500;">Warn</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">#8C5A1F</div>
    </div>
    <div>
      <div style="height:90px; background:#7A2E2A; border-radius:4px; display:flex; align-items:flex-end; padding:10px;">
        <span style="font-family:var(--font-mono); font-size:11px; color:#FAF7F2;">danger</span>
      </div>
      <div style="margin-top:8px; font-family:var(--font-sans); font-size:12px; color:var(--ink); font-weight:500;">Danger</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">accent</div>
    </div>
  </div>
</body></html>
