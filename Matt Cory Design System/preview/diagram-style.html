<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-eyebrow">Diagram style — hand-drawn</div>
  <svg width="640" height="180" viewBox="0 0 640 180" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block;">
    <defs>
      <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="3"/>
        <feDisplacementMap in="SourceGraphic" scale="1.6"/>
      </filter>
    </defs>
    <g filter="url(#rough)" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" fill="none">
      <!-- Source -->
      <rect x="20" y="60" width="140" height="64" rx="3"/>
      <!-- AI layer -->
      <rect x="240" y="40" width="160" height="100" rx="3"/>
      <!-- Sink -->
      <rect x="480" y="60" width="140" height="64" rx="3"/>
      <!-- Arrows -->
      <path d="M160 92 L240 92"/>
      <path d="M232 86 L240 92 L232 98"/>
      <path d="M400 92 L480 92"/>
      <path d="M472 86 L480 92 L472 98"/>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="12" fill="#1A1A1A">
      <text x="90" y="98" text-anchor="middle">D365 BC</text>
      <text x="320" y="86" text-anchor="middle">documentation</text>
      <text x="320" y="104" text-anchor="middle">pipeline</text>
      <text x="550" y="98" text-anchor="middle">audit log</text>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#6B665E">
      <text x="200" y="84" text-anchor="middle">events</text>
      <text x="440" y="84" text-anchor="middle">writes</text>
    </g>
  </svg>
  <div style="margin-top:6px; font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">SVG fractal-noise displacement · mono labels · ink-on-paper</div>
</body></html>
