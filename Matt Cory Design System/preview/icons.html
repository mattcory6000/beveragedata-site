<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-eyebrow">Iconography — Lucide, 1.5px stroke</div>
  <div style="display:grid; grid-template-columns: repeat(8, 1fr); gap:18px; align-items:center;">
    <!-- arrow-right -->
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--ink);"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    <!-- arrow-up-right -->
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--ink);"><path d="M7 17 17 7M7 7h10v10"/></svg>
    <!-- file-text -->
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--ink);"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
    <!-- code -->
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--ink);"><path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/></svg>
    <!-- mail -->
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--ink);"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>
    <!-- layers -->
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--ink);"><path d="m12 2 10 5-10 5L2 7zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    <!-- workflow -->
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--ink);"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/><path d="M11 7h4a2 2 0 0 1 2 2v4"/></svg>
    <!-- check -->
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--ink);"><path d="M20 6 9 17l-5-5"/></svg>
  </div>
  <div style="margin-top:22px; padding-top:18px; border-top:1px solid var(--rule); display:flex; gap:18px; align-items:center; flex-wrap:wrap;">
    <span style="font-family:var(--font-mono); font-size:13px; color:var(--ink);">→</span>
    <span style="font-family:var(--font-mono); font-size:13px; color:var(--ink);">↗</span>
    <span style="font-family:var(--font-mono); font-size:13px; color:var(--ink);">·</span>
    <span style="font-family:var(--font-mono); font-size:13px; color:var(--ink);">—</span>
    <span style="font-family:var(--font-mono); font-size:13px; color:var(--ink);">§</span>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3); margin-left:auto;">unicode marks · sanctioned set</span>
  </div>
</body></html>
