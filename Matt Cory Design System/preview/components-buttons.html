<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-eyebrow">Buttons</div>
  <div style="display:flex; gap:14px; align-items:center; flex-wrap:wrap;">
    <button style="font-family:var(--font-sans); font-size:14px; font-weight:500; color:var(--paper); background:var(--ink); border:1px solid var(--ink); border-radius:4px; padding:10px 18px; cursor:pointer; letter-spacing:-0.005em;">Primary action</button>
    <button style="font-family:var(--font-sans); font-size:14px; font-weight:500; color:var(--ink); background:transparent; border:1px solid var(--rule-strong); border-radius:4px; padding:10px 18px; cursor:pointer; letter-spacing:-0.005em;">Secondary</button>
    <button style="font-family:var(--font-sans); font-size:14px; font-weight:500; color:var(--ink); background:transparent; border:0; padding:10px 4px; cursor:pointer; letter-spacing:-0.005em;">Tertiary →</button>
    <button style="font-family:var(--font-sans); font-size:14px; font-weight:500; color:#7A2E2A; background:transparent; border:1px solid #7A2E2A; border-radius:4px; padding:10px 18px; cursor:pointer;">Read essay</button>
  </div>
  <div style="margin-top:18px; display:flex; gap:14px; align-items:center;">
    <button style="font-family:var(--font-sans); font-size:13px; font-weight:500; color:var(--paper); background:var(--ink-2); border:1px solid var(--ink-2); border-radius:4px; padding:7px 14px;">Small</button>
    <button style="font-family:var(--font-sans); font-size:14px; font-weight:500; color:var(--ink-4); background:var(--paper-2); border:1px solid var(--rule); border-radius:4px; padding:10px 18px; cursor:not-allowed;">Disabled</button>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3); margin-left:auto;">no scale · no shadow lift</span>
  </div>
</body></html>
