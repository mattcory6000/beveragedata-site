<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-eyebrow">Type scale</div>
  <div style="display:grid; grid-template-columns: 56px 1fr 80px; gap:12px 18px; align-items:baseline;">
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">88</span>
    <span style="font-family:var(--font-serif); font-weight:300; font-size:64px; letter-spacing:-0.02em; line-height:1; color:var(--ink);">Aa</span>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">title</span>

    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">64</span>
    <span style="font-family:var(--font-serif); font-weight:300; font-size:48px; letter-spacing:-0.02em; line-height:1; color:var(--ink);">Display</span>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">display</span>

    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">44</span>
    <span style="font-family:var(--font-serif); font-weight:300; font-size:34px; letter-spacing:-0.01em; line-height:1; color:var(--ink);">Heading 1</span>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">h1</span>

    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">32</span>
    <span style="font-family:var(--font-serif); font-size:26px; letter-spacing:-0.01em; line-height:1; color:var(--ink);">Heading 2</span>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">h2</span>

    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">19</span>
    <span style="font-family:var(--font-sans); font-size:17px; color:var(--ink-2); line-height:1;">Lede paragraph</span>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">lede</span>

    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">17</span>
    <span style="font-family:var(--font-sans); font-size:15px; color:var(--ink-2); line-height:1;">Body — primary reading text</span>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">body</span>

    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">13</span>
    <span style="font-family:var(--font-sans); font-size:13px; color:var(--ink-3); line-height:1;">Meta — captions, dates</span>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">meta</span>

    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">12</span>
    <span style="font-family:var(--font-sans); font-size:11px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-3); line-height:1;">Eyebrow label</span>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">eyebrow</span>
  </div>
</body></html>
