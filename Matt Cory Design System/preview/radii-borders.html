<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-eyebrow">Radii & borders</div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:18px; align-items:end;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:80px; height:60px; background:var(--paper-2); border:1px solid var(--rule); border-radius:2px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink);">2px · sm</div>
      <div style="font-size:11px; color:var(--ink-3);">inline code</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:80px; height:60px; background:var(--paper-2); border:1px solid var(--rule); border-radius:4px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink);">4px · default</div>
      <div style="font-size:11px; color:var(--ink-3);">cards · inputs</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:80px; height:60px; background:var(--paper-2); border:1px solid var(--rule); border-radius:6px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink);">6px · md</div>
      <div style="font-size:11px; color:var(--ink-3);">callouts</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:80px; height:60px; background:var(--paper-2); border:1px solid var(--rule); border-radius:10px;"></div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink);">10px · lg</div>
      <div style="font-size:11px; color:var(--ink-3);">cap · max</div>
    </div>
  </div>
  <div style="margin-top:22px; padding-top:18px; border-top:1px solid var(--rule); display:flex; gap:24px; align-items:center;">
    <div style="flex:1; height:1px; background:var(--rule);"></div>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">--rule (1px)</span>
    <div style="flex:1; height:1px; background:var(--rule-strong);"></div>
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">--rule-strong (1px)</span>
  </div>
</body></html>
