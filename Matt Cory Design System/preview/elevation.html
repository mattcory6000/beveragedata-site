<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="background:var(--paper-2);">
  <div class="card-eyebrow">Elevation — restrained</div>
  <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:18px;">
    <div>
      <div style="height:84px; background:var(--paper); border-radius:4px; box-shadow: 0 1px 0 rgba(20,18,14,0.04);"></div>
      <div style="margin-top:10px; font-family:var(--font-sans); font-size:12px; color:var(--ink); font-weight:500;">Shadow 1</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">hairline · sticky nav</div>
    </div>
    <div>
      <div style="height:84px; background:var(--paper); border-radius:4px; box-shadow: 0 1px 2px rgba(20,18,14,0.06), 0 0 0 1px rgba(20,18,14,0.04);"></div>
      <div style="margin-top:10px; font-family:var(--font-sans); font-size:12px; color:var(--ink); font-weight:500;">Shadow 2</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">soft · button hover</div>
    </div>
    <div>
      <div style="height:84px; background:var(--paper); border-radius:4px; box-shadow: 0 6px 24px -8px rgba(20,18,14,0.12), 0 0 0 1px rgba(20,18,14,0.05);"></div>
      <div style="margin-top:10px; font-family:var(--font-sans); font-size:12px; color:var(--ink); font-weight:500;">Shadow 3</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">popover only</div>
    </div>
  </div>
</body></html>
