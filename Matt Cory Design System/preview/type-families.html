<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-eyebrow">Type families</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:24px;">
    <div>
      <div style="font-family:var(--font-serif); font-weight:300; font-size:44px; letter-spacing:-0.02em; line-height:1; color:var(--ink);">Aa</div>
      <div style="margin-top:10px; font-family:var(--font-serif); font-size:13px; color:var(--ink); font-weight:500;">Source Serif 4</div>
      <div style="font-size:12px; color:var(--ink-3); margin-top:2px;">Headings · display · pull-quotes</div>
    </div>
    <div>
      <div style="font-family:var(--font-sans); font-weight:400; font-size:44px; letter-spacing:-0.01em; line-height:1; color:var(--ink);">Aa</div>
      <div style="margin-top:10px; font-family:var(--font-sans); font-size:13px; color:var(--ink); font-weight:600;">Inter</div>
      <div style="font-size:12px; color:var(--ink-3); margin-top:2px;">Body · UI · ledes · meta</div>
    </div>
    <div>
      <div style="font-family:var(--font-mono); font-weight:400; font-size:44px; letter-spacing:0; line-height:1; color:var(--ink);">Aa</div>
      <div style="margin-top:10px; font-family:var(--font-mono); font-size:13px; color:var(--ink); font-weight:500;">JetBrains Mono</div>
      <div style="font-size:12px; color:var(--ink-3); margin-top:2px;">Code · diagram labels · meta</div>
    </div>
  </div>
</body></html>
