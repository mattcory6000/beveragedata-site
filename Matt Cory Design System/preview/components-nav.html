<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-eyebrow">Navigation — top bar</div>
  <div style="border:1px solid var(--rule); border-radius:4px; overflow:hidden;">
    <div style="display:flex; align-items:center; padding:14px 22px; background:var(--paper); border-bottom:1px solid var(--rule);">
      <div style="display:flex; align-items:center; gap:10px;">
        <div style="width:28px; height:28px; border:1px solid var(--ink); border-radius:3px; display:flex; align-items:center; justify-content:center;">
          <span style="font-family:var(--font-serif); font-weight:300; font-size:14px; letter-spacing:-0.02em; color:var(--ink);">MC</span>
        </div>
      </div>
      <nav style="display:flex; gap:24px; margin-left:auto; align-items:center;">
        <a href="#" style="font-family:var(--font-sans); font-size:14px; color:var(--ink); text-decoration:none; border-bottom:1px solid var(--ink); padding-bottom:1px;">Work</a>
        <a href="#" style="font-family:var(--font-sans); font-size:14px; color:var(--ink-2); text-decoration:none;">Writing</a>
        <a href="#" style="font-family:var(--font-sans); font-size:14px; color:var(--ink-2); text-decoration:none;">Now</a>
        <a href="#" style="font-family:var(--font-sans); font-size:14px; color:var(--ink-2); text-decoration:none;">About</a>
        <a href="#" style="font-family:var(--font-sans); font-size:14px; color:#7A2E2A; text-decoration:none; border-bottom:1px solid #7A2E2A; padding-bottom:1px;">Contact</a>
      </nav>
    </div>
  </div>
  <div style="margin-top:14px; font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">Active link → ink underline · Contact → accent · 14px sans</div>
</body></html>
