<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-eyebrow">Pull quote & callout</div>
  <blockquote style="font-family:var(--font-serif); font-style:italic; font-weight:300; font-size:22px; line-height:1.3; color:var(--ink); border-left:2px solid #7A2E2A; padding-left:18px; margin:0 0 22px 0;">
    Most AI features fail in enterprise software because they were built as features, not as systems.
  </blockquote>
  <div style="border:1px solid var(--rule); border-left:2px solid var(--ink); background:var(--paper-2); padding:14px 18px; border-radius:0 4px 4px 0;">
    <div style="font-family:var(--font-sans); font-size:11px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-3);">NOTE</div>
    <div style="font-family:var(--font-sans); font-size:14px; line-height:1.55; color:var(--ink-2); margin-top:4px;">Names withheld at the client's request. Architecture details are generalized.</div>
  </div>
</body></html>
