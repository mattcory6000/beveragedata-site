<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-eyebrow">Accent — oxblood</div>
  <div style="display:grid; grid-template-columns: 1.4fr 1fr 1fr; gap:14px; align-items:stretch;">
    <div>
      <div style="height:120px; background:#7A2E2A; border-radius:4px; display:flex; align-items:flex-end; padding:14px;">
        <span style="font-family:var(--font-serif); font-style:italic; font-weight:300; font-size:22px; color:#FAF7F2;">accent</span>
      </div>
      <div style="margin-top:8px; font-family:var(--font-sans); font-size:12px; color:var(--ink); font-weight:500;">Accent · Oxblood</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">#7A2E2A · links · focus · marks</div>
    </div>
    <div>
      <div style="height:120px; background:#5C201D; border-radius:4px;"></div>
      <div style="margin-top:8px; font-family:var(--font-sans); font-size:12px; color:var(--ink); font-weight:500;">Accent Hover</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">#5C201D</div>
    </div>
    <div>
      <div style="height:120px; background:#F0E2DF; border:1px solid var(--rule); border-radius:4px;"></div>
      <div style="margin-top:8px; font-family:var(--font-sans); font-size:12px; color:var(--ink); font-weight:500;">Accent Tint</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">#F0E2DF · selected</div>
    </div>
  </div>
</body></html>
