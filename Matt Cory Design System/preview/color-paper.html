<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-eyebrow">Paper — neutral backgrounds</div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:14px;">
    <div>
      <div style="height:90px; background:#FAF7F2; border:1px solid var(--rule); border-radius:4px;"></div>
      <div style="margin-top:8px; font-family:var(--font-sans); font-size:12px; color:var(--ink); font-weight:500;">Paper</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">#FAF7F2</div>
    </div>
    <div>
      <div style="height:90px; background:#F2EEE6; border:1px solid var(--rule); border-radius:4px;"></div>
      <div style="margin-top:8px; font-family:var(--font-sans); font-size:12px; color:var(--ink); font-weight:500;">Paper 2</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">#F2EEE6</div>
    </div>
    <div>
      <div style="height:90px; background:#E8E2D6; border:1px solid var(--rule); border-radius:4px;"></div>
      <div style="margin-top:8px; font-family:var(--font-sans); font-size:12px; color:var(--ink); font-weight:500;">Paper 3</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">#E8E2D6</div>
    </div>
    <div>
      <div style="height:90px; background:#DCD4C4; border:1px solid var(--rule); border-radius:4px;"></div>
      <div style="margin-top:8px; font-family:var(--font-sans); font-size:12px; color:var(--ink); font-weight:500;">Paper Edge</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">#DCD4C4</div>
    </div>
  </div>
</body></html>
