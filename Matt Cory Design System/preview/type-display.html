<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-eyebrow">Display & headings — Source Serif 4</div>
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:baseline; gap:18px;">
      <div style="font-family:var(--font-serif); font-weight:300; font-size:64px; letter-spacing:-0.02em; line-height:1.05; color:var(--ink);">Display</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">64 / 1.05 / -0.02em / 300</div>
    </div>
    <div style="display:flex; align-items:baseline; gap:18px;">
      <div style="font-family:var(--font-serif); font-weight:300; font-size:44px; letter-spacing:-0.01em; line-height:1.1; color:var(--ink);">Heading 1</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">44 / 1.1 / -0.01em / 300</div>
    </div>
    <div style="display:flex; align-items:baseline; gap:18px;">
      <div style="font-family:var(--font-serif); font-weight:400; font-size:32px; letter-spacing:-0.01em; line-height:1.2; color:var(--ink);">Heading 2</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">32 / 1.2 / -0.01em / 400</div>
    </div>
    <div style="display:flex; align-items:baseline; gap:18px;">
      <div style="font-family:var(--font-serif); font-weight:400; font-size:26px; line-height:1.2; color:var(--ink);">Heading 3</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">26 / 1.2 / 0 / 400</div>
    </div>
    <div style="display:flex; align-items:baseline; gap:18px;">
      <div style="font-family:var(--font-serif); font-weight:400; font-size:22px; line-height:1.25; color:var(--ink);">Heading 4</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">22 / 1.25 / 0 / 400</div>
    </div>
  </div>
</body></html>
