<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="card-eyebrow">Ink — text & foreground</div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:14px;">
    <div>
      <div style="height:90px; background:#1A1A1A; border-radius:4px;"></div>
      <div style="margin-top:8px; font-family:var(--font-sans); font-size:12px; color:var(--ink); font-weight:500;">Ink</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">#1A1A1A</div>
    </div>
    <div>
      <div style="height:90px; background:#3A3733; border-radius:4px;"></div>
      <div style="margin-top:8px; font-family:var(--font-sans); font-size:12px; color:var(--ink); font-weight:500;">Ink 2</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">#3A3733</div>
    </div>
    <div>
      <div style="height:90px; background:#6B665E; border-radius:4px;"></div>
      <div style="margin-top:8px; font-family:var(--font-sans); font-size:12px; color:var(--ink); font-weight:500;">Ink 3</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">#6B665E</div>
    </div>
    <div>
      <div style="height:90px; background:#9C968A; border-radius:4px;"></div>
      <div style="margin-top:8px; font-family:var(--font-sans); font-size:12px; color:var(--ink); font-weight:500;">Ink 4</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--ink-3);">#9C968A</div>
    </div>
  </div>
</body></html>
