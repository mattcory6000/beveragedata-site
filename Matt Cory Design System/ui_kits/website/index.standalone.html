<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matt Cory — Principal Architect</title>
  <link rel="stylesheet" href="site.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#FAF7F2">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#FAF7F2"/>
      <g transform="translate(420 260)">
        <rect x="0" y="0" width="360" height="280" rx="8" fill="none" stroke="#1A1A1A" stroke-width="3"/>
        <text x="180" y="200" text-anchor="middle"
              font-family="'Source Serif 4', 'Iowan Old Style', Georgia, serif"
              font-size="180" font-weight="300" letter-spacing="-3"
              fill="#1A1A1A">MC</text>
      </g>
      <rect x="420" y="600" width="360" height="2" fill="#7A2E2A"/>
    </svg>
  </template>
  <div id="root"></div>

  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="WorkIndex.jsx"></script>
  <script type="text/babel" src="WritingIndex.jsx"></script>
  <script type="text/babel" src="CaseStudy.jsx"></script>
  <script type="text/babel" src="About.jsx"></script>
  <script type="text/babel" src="Now.jsx"></script>
  <script type="text/babel" src="Contact.jsx"></script>

  <script type="text/babel">
    function App() {
      const [route, setRoute] = React.useState({ page: 'home', arg: null });
      const go = (page, arg = null) => {
        setRoute({ page, arg });
        window.scrollTo({ top: 0, behavior: 'auto' });
      };

      let body;
      if (route.page === 'home') {
        body = (<>
          <Hero go={go} />
          <WorkIndex go={go} />
        </>);
      } else if (route.page === 'writing') {
        body = <WritingIndex go={go} />;
      } else if (route.page === 'now') {
        body = <Now go={go} />;
      } else if (route.page === 'about') {
        body = <About go={go} />;
      } else if (route.page === 'contact') {
        body = <Contact go={go} />;
      } else if (route.page === 'case-study') {
        body = <CaseStudy id={route.arg} go={go} />;
      }

      return (
        <div className="site" data-screen-label={"Site · " + route.page}>
          <Nav current={route.page} go={go} />
          <main style={{ flex: 1 }}>{body}</main>
          <Footer go={go} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
